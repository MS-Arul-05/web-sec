services:
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:8080
      # Supabase Auth + Postgres — provide via a .env file or your shell.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '4000:4000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time (publishable key is public).
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
    depends_on:
      - backend
    ports:
      - '8080:80'
    restart: unless-stopped
