# Render Blueprint — deploys the API as a web service.
# Auth + database are provided by Supabase (set the env vars below in the dashboard).
# Deploy the frontend on Vercel (root vercel.json) or as a Render Static Site.
services:
  - type: web
    name: secure-web-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npx prisma db push --skip-generate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false # set to your deployed frontend URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false # Supabase Postgres connection string (pooled, port 6543)
