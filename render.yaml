# Render Blueprint — deploys the API (web service) + a managed Postgres DB.
# Deploy the frontend separately on Vercel (see vercel.json) or as a Render Static Site.
services:
  - type: web
    name: secure-web-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npx prisma db push --skip-generate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false # set to your deployed frontend URL
      - key: DATABASE_URL
        fromDatabase:
          name: secure-web-db
          property: connectionString

databases:
  - name: secure-web-db
    plan: free
    databaseName: secureweb
    user: secureweb
